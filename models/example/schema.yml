version: 2

models:
  - name: my_first_dbt_model
    description: "A starter dbt model"
    columns:
      - name: id
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null

  - name: my_second_dbt_model
    description: "A starter dbt model"
    columns:
      - name: id
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Staged orders data cleaned from raw source"
    columns:
      - name: order_id
        description: "Primary key — unique order identifier"
        data_tests:
          - unique
          - not_null
      - name: status
        description: "Current order status"
        data_tests:
          - accepted_values:
              values: ['completed', 'returned', 'return_pending', 'shipped', 'placed']
      - name: user_id
        description: "The user who placed the order"
        data_tests:
          - not_null

  - name: orders_summary
    description: "Aggregated order counts and dates by status"
    columns:
      - name: status
        description: "Order status group"
        data_tests:
          - unique
          - not_null